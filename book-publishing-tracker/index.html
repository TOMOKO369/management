<!DOCTYPE html>
<html class="light" lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>出版への道のり | Publishing Journey</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = { darkMode: "class", theme: { extend: { colors: {
        "background": "#fbf9f5", "surface-container-highest": "#e4e2de", "secondary-container": "#ffab69",
        "outline": "#737780", "secondary-fixed": "#ffdcc4", "surface-bright": "#fbf9f5",
        "outline-variant": "#c3c6d1", "surface-dim": "#dbdad6", "primary-container": "#003366",
        "primary-fixed": "#d5e3ff", "surface-container": "#efeeea", "on-secondary": "#ffffff",
        "on-background": "#1b1c1a", "surface-container-low": "#f5f3ef", "on-surface": "#1b1c1a",
        "on-surface-variant": "#43474f", "primary": "#001e40", "error-container": "#ffdad6",
        "on-error-container": "#93000a", "on-tertiary": "#ffffff", "surface-container-lowest": "#ffffff",
        "secondary": "#8e4e14", "surface-container-high": "#eae8e4", "on-primary": "#ffffff",
        "error": "#ba1a1a", "surface": "#fbf9f5", "on-error": "#ffffff" },
        fontFamily: { "headline": ["Newsreader", "Noto Serif JP", "serif"], "body": ["Manrope", "Noto Sans JP", "sans-serif"], "label": ["Manrope", "Noto Sans JP", "sans-serif"] },
    }}}
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { min-height: max(884px, 100dvh); }
    [style*="display: none"] { display: none !important; }
</style>
</head>
<body class="bg-background text-on-background min-h-screen selection:bg-secondary-container/30">

<header class="fixed top-0 w-full z-50 bg-[#fbf9f5]/80 backdrop-blur-xl flex flex-col md:flex-row justify-between items-center px-6 md:px-8 py-4 max-w-full mx-auto border-b border-outline-variant/20 gap-4 md:gap-0">
    <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-primary text-3xl" data-icon="menu_book">menu_book</span>
        <span class="font-headline font-bold italic text-2xl text-[#001e40]">Publishing Journey</span>
    </div>
    <div class="flex gap-2 md:gap-4 items-center overflow-x-auto w-full md:w-auto pb-2 md:pb-0">
        <button id="add-task-btn" class="shrink-0 font-sans uppercase tracking-widest text-xs font-bold text-on-primary bg-primary hover:bg-primary/90 shadow-md transition-colors px-4 py-2 rounded-lg flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">add</span> タスク追加
        </button>
        <button id="export-btn" class="shrink-0 font-sans uppercase tracking-widest text-xs font-bold text-[#8e4e14] hover:bg-[#efeeea] border border-[#8e4e14]/20 transition-colors px-3 py-2 rounded-lg flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">download</span> エクスポート
        </button>
        <button id="import-btn" class="shrink-0 font-sans uppercase tracking-widest text-xs font-bold text-slate-600 hover:bg-[#efeeea] border border-slate-300 transition-colors px-3 py-2 rounded-lg flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">upload</span> インポート
        </button>
        <input type="file" id="import-file" style="display: none;" accept=".json">
    </div>
</header>

<main class="pt-36 md:pt-32 pb-20 px-6 md:px-12">
    <div class="max-w-5xl mx-auto">
        <section class="mb-20">
            <h1 class="text-5xl md:text-7xl font-headline italic font-bold text-primary mb-6 tracking-tight leading-none">
                本が完成するまで
            </h1>
            <p class="max-w-xl text-lg text-on-surface-variant font-body leading-relaxed border-l-2 border-secondary-container pl-6">
                企画から出版、そして読者の手に届くまで。すべての道のりを記録し、次のステップを見据えましょう。この一歩一歩が、あなたの本を形作ります。
            </p>
        </section>

        <!-- Dynamic Timeline will be injected here -->
        <div class="relative" id="timeline-container">
            <!-- Connector Line -->
            <div class="absolute left-4 md:left-1/2 top-0 bottom-0 w-0.5 bg-outline-variant/40 md:-translate-x-1/2"></div>
            <div class="space-y-16" id="timeline-phases"></div>
        </div>

        <section class="mt-32" id="task-list-section">
            <h2 class="text-3xl font-headline italic font-bold text-primary mb-8 border-b border-outline-variant/30 pb-4">すべてのタスク</h2>
            <div class="bg-surface-container-lowest rounded-xl border border-outline-variant/15 overflow-x-auto shadow-sm">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-surface-container-low text-on-surface-variant border-b border-outline-variant/30 text-sm font-label uppercase tracking-wider">
                            <th class="p-4 font-bold min-w-[120px]">工程</th>
                            <th class="p-4 font-bold min-w-[200px]">タスク名</th>
                            <th class="p-4 font-bold min-w-[100px]">ステータス</th>
                            <th class="p-4 font-bold min-w-[100px]">期日</th>
                            <th class="p-4 font-bold text-right min-w-[100px]">操作</th>
                        </tr>
                    </thead>
                    <tbody id="task-table-body" class="font-body text-on-surface text-sm divide-y divide-outline-variant/15"></tbody>
                </table>
            </div>
        </section>
    </div>
</main>

<!-- Modal for Task Input -->
<div id="task-modal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm transition-opacity">
    <div class="bg-surface-container-lowest rounded-xl shadow-2xl w-full max-w-lg overflow-hidden border border-outline-variant/20">
        <div class="px-6 py-4 flex justify-between items-center border-b border-outline-variant/20 bg-surface-container-low">
            <h3 id="modal-title" class="font-headline font-bold text-xl text-primary italic">タスクを追加</h3>
            <button id="close-modal-btn" class="text-on-surface-variant hover:text-error transition-colors"><span class="material-symbols-outlined">close</span></button>
        </div>
        <form id="task-form" class="p-6 space-y-4 font-body">
            <input type="hidden" id="task-id">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-outline mb-1">工程 (Phase)</label>
                <select id="task-phase" class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:outline-none" required>
                    <option value="企画・プロット">1. 企画・プロット</option>
                    <option value="執筆">2. 執筆</option>
                    <option value="編集・校正">3. 編集・校正</option>
                    <option value="表紙・デザイン">4. 表紙・デザイン</option>
                    <option value="組版・レイアウト">5. 組版・レイアウト</option>
                    <option value="印刷・電子化">6. 印刷・電子化</option>
                    <option value="宣伝・販売">7. 宣伝・販売</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-outline mb-1">タスク名</label>
                <input type="text" id="task-name" class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:outline-none" required>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-outline mb-1">ステータス</label>
                    <select id="task-status" class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:outline-none">
                        <option value="未着手">未着手</option>
                        <option value="進行中">進行中</option>
                        <option value="確認中">確認中</option>
                        <option value="完了">完了</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-outline mb-1">期日</label>
                    <input type="date" id="task-deadline" class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:outline-none">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-outline mb-1">メモ</label>
                <textarea id="task-notes" rows="3" class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:outline-none resize-none"></textarea>
            </div>
            <div class="pt-4 flex justify-end gap-3">
                <button type="button" id="cancel-modal-btn" class="px-6 py-2 rounded-lg font-bold text-on-surface-variant hover:bg-surface-container-high transition-colors text-sm">キャンセル</button>
                <button type="submit" class="px-6 py-2 rounded-lg font-bold bg-primary text-on-primary hover:bg-primary/90 transition-colors shadow-md text-sm">保存する</button>
            </div>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
