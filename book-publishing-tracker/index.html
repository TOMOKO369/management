<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>逆算スケジュールメーカー</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
    body { font-family: 'Noto Sans JP', sans-serif; background-color: #fafafa; }
    .timeline-line {
        position: absolute;
        left: 21px; /* 42/2 */
        top: 2rem;
        bottom: 0;
        width: 2px;
        background-color: #e5e7eb;
        z-index: 0;
    }
</style>
</head>
<body class="text-gray-800">
<div class="max-w-3xl mx-auto py-12 px-6">
    <div class="text-center mb-10">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">📅 創作逆算スケジュールメーカー</h1>
        <p class="text-gray-500 text-sm">締切日を入力すると、本や漫画の制作スケジュールを自動で逆算します。</p>
    </div>

    <!-- 入力フォーム -->
    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100 mb-12 flex flex-col md:flex-row gap-6 items-end">
        <div class="w-full md:w-1/3">
            <label class="block text-sm font-bold text-gray-700 mb-2">作成ジャンル</label>
            <select id="project-type" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3">
                <option value="manga">漫画・同人誌</option>
                <option value="book">技術書・ビジネス本</option>
                <option value="novel">小説・ライトノベル</option>
            </select>
        </div>
        <div class="w-full md:w-1/3">
            <label class="block text-sm font-bold text-gray-700 mb-2">入稿締切日（出版日）</label>
            <input type="date" id="deadline-date" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3" required>
        </div>
        <div class="w-full md:w-1/3">
            <button id="generate-btn" class="w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-bold rounded-lg text-sm px-5 py-3 text-center transition-colors">
                スケジュールを逆算
            </button>
        </div>
    </div>

    <!-- 出力先 -->
    <div id="schedule-output" class="hidden relative pl-4 md:pl-0">
        <h2 class="text-lg font-bold text-gray-600 mb-8 ml-2" id="schedule-title">現実的な制作フェーズ（3フェーズ制）</h2>
        <div class="timeline-line hidden md:block" style="left: 21px;"></div>
        <div class="timeline-line block md:hidden" style="left: 37px;"></div>
        
        <div id="timeline-container" class="space-y-10 pb-8">
            <!-- JSでアイテムを生成 -->
        </div>
        
        <div class="text-center mt-12 pt-8 border-t border-gray-200">
            <button id="export-csv-btn" class="text-gray-600 bg-white border border-gray-300 hover:bg-gray-50 font-medium rounded-lg text-sm px-8 py-3 text-center shadow-sm transition-colors">
                CSVで書き出す (スプレッドシート用)
            </button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
